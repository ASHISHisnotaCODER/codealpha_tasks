<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodeAlpha Tasks Banner</title>
  <desc id="desc">Animated banner for the repository README.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="20" x2="1080" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="48%" stop-color="#0f2a44"/>
      <stop offset="100%" stop-color="#1c132e"/>
      <animate attributeName="x1" values="120;300;120" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1080;900;1080" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cf7ff"/>
      <stop offset="50%" stop-color="#b9ff7a"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <circle cx="180" cy="90" r="86" fill="#7cf7ff" opacity="0.14" filter="url(#blur)">
    <animate attributeName="cx" values="180;250;180" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="90;130;90" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="270" r="110" fill="#ffd166" opacity="0.12" filter="url(#blur)">
    <animate attributeName="cx" values="1010;940;1010" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="270;240;270" dur="9s" repeatCount="indefinite"/>
  </circle>
  <path d="M0 276C170 220 310 320 460 270C610 220 750 120 900 170C1020 210 1120 250 1200 230V360H0V276Z" fill="#ffffff" opacity="0.05">
    <animate attributeName="d" dur="7s" repeatCount="indefinite" values="M0 276C170 220 310 320 460 270C610 220 750 120 900 170C1020 210 1120 250 1200 230V360H0V276Z;M0 286C170 250 310 300 460 250C610 200 760 140 900 190C1030 230 1120 230 1200 210V360H0V286Z;M0 276C170 220 310 320 460 270C610 220 750 120 900 170C1020 210 1120 250 1200 230V360H0V276Z"/>
  </path>

  <g>
    <text x="80" y="124" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="1.5">CodeAlpha Tasks</text>
    <text x="80" y="170" fill="#d7e7ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" opacity="0.92">Task-1: Streamlit chatbot  •  Task-2: Email extractor</text>
    <rect x="80" y="204" width="206" height="42" rx="21" fill="url(#glow)">
      <animate attributeName="opacity" values="0.72;1;0.72" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <text x="104" y="232" fill="#07111f" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Python • Automation • UI</text>
  </g>

  <g opacity="0.9">
    <rect x="860" y="74" width="220" height="212" rx="28" fill="#07111f" opacity="0.38" stroke="#b7d5ff" stroke-opacity="0.25"/>
    <circle cx="915" cy="124" r="18" fill="#7cf7ff">
      <animate attributeName="r" values="18;24;18" dur="3s" repeatCount="indefinite"/>
    </circle>
    <rect x="950" y="108" width="88" height="14" rx="7" fill="#dce9ff" opacity="0.9"/>
    <rect x="915" y="162" width="136" height="14" rx="7" fill="#dce9ff" opacity="0.7"/>
    <rect x="915" y="192" width="92" height="14" rx="7" fill="#dce9ff" opacity="0.55"/>
    <rect x="915" y="222" width="118" height="14" rx="7" fill="#dce9ff" opacity="0.45"/>
  </g>
</svg>
